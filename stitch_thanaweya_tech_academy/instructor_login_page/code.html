<body class="font-body-base text-body-base flex items-center justify-center min-h-screen relative tactical-grid">
<!-- Background Shader -->

<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[480px] px-container-margin py-section-gap">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-6 p-4 rounded-xl bg-surface-container-high border border-white/5 shadow-xl">
<span class="material-symbols-outlined text-primary-container text-6xl" style="font-variation-settings: 'FILL' 1;">terminal</span>

<!-- Login Card -->
<div class="glass-card p-8 md:p-10 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Decorative Tech Corner -->

<h2 class="font-headline-md text-headline-md text-on-surface">تسجيل دخول المحاضر</h2>
<div class="w-12 h-1 bg-primary-container mt-2"></div>
</header>
<form class="space-y-6" onsubmit="return false">
<!-- Username/Email -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">alternate_email</span>
                        البريد الإلكتروني أو اسم المستخدم
                    </label>
<div class="bg-[#05070a] border border-white/10 rounded-lg flex items-center px-4 transition-all input-focus-glow group">
<input class="bg-transparent border-none w-full py-4 text-on-surface focus:ring-0 placeholder:text-on-surface-variant/30 text-right font-code-sm" placeholder="admin@academy.com" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
                        كلمة المرور
                    </label>
<div class="bg-[#05070a] border border-white/10 rounded-lg flex items-center px-4 transition-all input-focus-glow group">
<input class="bg-transparent border-none w-full py-4 text-on-surface focus:ring-0 placeholder:text-on-surface-variant/30 text-right font-code-sm" placeholder="••••••••" type="password"/>
<button class="text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-display-lg text-[18px] font-bold shadow-[0_0_15px_rgba(0,210,255,0.3)] hover:shadow-[0_0_25px_rgba(0,210,255,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-8 group" type="submit">
<span>دخول إلى المنصة</span>

</button>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                const moveX = (x - 0.5) * 10;
                const moveY = (y - 0.5) * 10;
                card.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
            });
        });

        // Simple visibility toggle logic
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('input[type="password"]');
        toggleBtn?.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.innerHTML = `<span class="material-symbols-outlined">${isPass ? 'visibility' : 'visibility_off'}</span>`;
        });
    </script>
